<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Classes - School Database</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
</head>

<body>
	<div class="layout">
		<div class="sidebar">
			<!-- sidebar content -->
			<a href="/" style="margin-bottom: 2vh;">Index</a>
			<a href="/students">Students</a>
			<a href="/teachers">Teachers</a>
			<a href="/classes">Classes</a>
			<a href="/subjects">Subjects</a>
			<a href="/enrollments">Enrollments</a>
		</div>

		<div class="main">
			<div class="header-button">
				<h1>Classes</h1>
				<button class="btn" id="addClassBtn" style="padding: 12px;">+ Add class</button>
			</div>

			<div>
				<table class="information-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Class Name</th>
							<th>Major</th>
							<th>Department</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<!-- To be populated by JavaScript -->
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<!-- Add Class Modal -->
	<div id="addClassModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Add New Class</h2>
				<span class="close">&times;</span>
			</div>
			<form id="addClassForm" class="modal-body">
				<div class="form-group">
					<label for="className">Class Name:</label>
					<input type="text" id="className" name="className" required>
				</div>
				<div class="form-group">
					<label for="major">Major:</label>
					<input type="text" id="major" name="major" required>
				</div>
				<div class="form-group">
					<label for="department">Department:</label>
					<input type="text" id="department" name="department" required>
				</div>
				<div class="modal-footer">
					<button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Add Class</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Edit Class Modal -->
	<div id="editClassModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Edit Class</h2>
				<span class="close" id="editCloseBtn">&times;</span>
			</div>
			<form id="editClassForm" class="modal-body">
				<input type="hidden" id="editClassId" name="classId">
				<div class="form-group">
					<label for="editClassName">Class Name:</label>
					<input type="text" id="editClassName" name="className" required>
				</div>
				<div class="form-group">
					<label for="editMajor">Major:</label>
					<input type="text" id="editMajor" name="major" required>
				</div>
				<div class="form-group">
					<label for="editDepartment">Department:</label>
					<input type="text" id="editDepartment" name="department" required>
				</div>
				<div class="modal-footer">
					<button type="button" id="editCancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Update Class</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Delete Class Modal -->
	<div id="deleteClassModal" class="modal">
		<div class="modal-content" style="max-width: 400px;">
			<div class="modal-header">
				<h2>Delete Class</h2>
				<span class="close" id="deleteCloseBtn">&times;</span>
			</div>
			<div class="modal-body">
				<p style="margin-bottom: 8px">Are you sure you want to delete this class?</p>
				<p><strong>ID:</strong> <span id="deleteClassId"></span></p>
				<p><strong>Name:</strong> <span id="deleteClassName"></span></p>
			</div>
			<div class="modal-footer">
				<button type="button" id="deleteCancelBtn" class="btn-secondary">Cancel</button>
				<button type="button" id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
			</div>
		</div>
	</div>

	<script src="{{ url_for('static', filename='js/classes.js') }}"></script>
</body>

</html>
