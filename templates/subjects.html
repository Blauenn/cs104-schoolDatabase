<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Subjects - School Database</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
</head>

<body>
	<div class="layout">
		<div class="sidebar">
			<!-- sidebar content -->
			<a href="/" style="margin-bottom: 2vh;">Index</a>
			<a href="/students">Students</a>
			<a href="/teachers">Teachers</a>
			<a href="/classes">Classes</a>
			<a href="/subjects">Subjects</a>
			<a href="/enrollments">Enrollments</a>
		</div>

		<div class="main">
			<div class="header-button">
				<h1>Subjects</h1>
				<button class="btn" id="addSubjectBtn" style="padding: 12px;">+ Add subject</button>
			</div>

			<div>
				<table class="information-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Subject Name</th>
							<th>Major</th>
							<th>Department</th>
							<th>Teacher</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<!-- To be populated by JavaScript -->
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<!-- Add Subject Modal -->
	<div id="addSubjectModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Add New Subject</h2>
				<span class="close">&times;</span>
			</div>
			<form id="addSubjectForm" class="modal-body">
				<div class="form-group">
					<label for="subjectName">Subject Name:</label>
					<input type="text" id="subjectName" name="subjectName" required>
				</div>
				<div class="form-group">
					<label for="major">Major:</label>
					<input type="text" id="major" name="major" required>
				</div>
				<div class="form-group">
					<label for="department">Department:</label>
					<input type="text" id="department" name="department" required>
				</div>
				<div class="form-group">
					<label for="teacherId">Teacher:</label>
					<select id="teacherId" name="teacherId">
						<option value="">-- Select a Teacher --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Add Subject</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Edit Subject Modal -->
	<div id="editSubjectModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Edit Subject</h2>
				<span class="close" id="editCloseBtn">&times;</span>
			</div>
			<form id="editSubjectForm" class="modal-body">
				<input type="hidden" id="editSubjectId" name="subjectId">
				<div class="form-group">
					<label for="editSubjectName">Subject Name:</label>
					<input type="text" id="editSubjectName" name="subjectName" required>
				</div>
				<div class="form-group">
					<label for="editMajor">Major:</label>
					<input type="text" id="editMajor" name="major" required>
				</div>
				<div class="form-group">
					<label for="editDepartment">Department:</label>
					<input type="text" id="editDepartment" name="department" required>
				</div>
				<div class="form-group">
					<label for="editTeacherId">Teacher:</label>
					<select id="editTeacherId" name="teacherId">
						<option value="">-- Select a Teacher --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="editCancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Update Subject</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Delete Subject Modal -->
	<div id="deleteSubjectModal" class="modal">
		<div class="modal-content" style="max-width: 400px;">
			<div class="modal-header">
				<h2>Delete Subject</h2>
				<span class="close" id="deleteCloseBtn">&times;</span>
			</div>
			<div class="modal-body">
				<p style="margin-bottom: 8px">Are you sure you want to delete this subject?</p>
				<p><strong>ID:</strong> <span id="deleteSubjectId"></span></p>
				<p><strong>Name:</strong> <span id="deleteSubjectName"></span></p>
			</div>
			<div class="modal-footer">
				<button type="button" id="deleteCancelBtn" class="btn-secondary">Cancel</button>
				<button type="button" id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
			</div>
		</div>
	</div>

	<script src="{{ url_for('static', filename='js/subjects.js') }}"></script>
</body>

</html>
