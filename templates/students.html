<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Students - School Database</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
</head>

<body>
	<div class="layout">
		<div class="sidebar">
			<!-- sidebar content -->
			<a href="/" style="margin-bottom: 2vh;">Index</a>
			<a href="/students">Students</a>
			<a href="/teachers">Teachers</a>
			<a href="/classes">Classes</a>
			<a href="/subjects">Subjects</a>
			<a href="/enrollments">Enrollments</a>
		</div>

		<div class="main">
			<div class="header-button">
				<h1>Students</h1>
				<button class="btn" id="addStudentBtn" style="padding: 12px;">+ Add student</button>
			</div>

			<div>
				<table class="information-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>First Name</th>
							<th>Last Name</th>
							<th>Email</th>
							<th>Phone</th>
							<th>Class ID</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<!-- To be populated by JavaScript -->
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<!-- Add Student Modal -->
	<div id="addStudentModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Add New Student</h2>
				<span class="close">&times;</span>
			</div>
			<form id="addStudentForm" class="modal-body">
				<div class="form-group">
					<label for="firstName">First Name:</label>
					<input type="text" id="firstName" name="firstName" required>
				</div>
				<div class="form-group">
					<label for="lastName">Last Name:</label>
					<input type="text" id="lastName" name="lastName" required>
				</div>
				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="phone">Phone:</label>
					<input type="tel" id="phone" name="phone" required>
				</div>
				<div class="form-group">
					<label for="classId">Class:</label>
					<select id="classId" name="classId">
						<option value="">-- Select a Class --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Add Student</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Edit Student Modal -->
	<div id="editStudentModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Edit Student</h2>
				<span class="close" id="editCloseBtn">&times;</span>
			</div>
			<form id="editStudentForm" class="modal-body">
				<input type="hidden" id="editStudentId" name="studentId">
				<div class="form-group">
					<label for="editFirstName">First Name:</label>
					<input type="text" id="editFirstName" name="firstName" required>
				</div>
				<div class="form-group">
					<label for="editLastName">Last Name:</label>
					<input type="text" id="editLastName" name="lastName" required>
				</div>
				<div class="form-group">
					<label for="editEmail">Email:</label>
					<input type="email" id="editEmail" name="email" required>
				</div>
				<div class="form-group">
					<label for="editPhone">Phone:</label>
					<input type="tel" id="editPhone" name="phone" required>
				</div>
				<div class="form-group">
					<label for="editClassId">Class:</label>
					<select id="editClassId" name="classId">
						<option value="">-- Select a Class --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="editCancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Update Student</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Delete Student Modal -->
	<div id="deleteStudentModal" class="modal">
		<div class="modal-content" style="max-width: 400px;">
			<div class="modal-header">
				<h2>Delete Student</h2>
				<span class="close" id="deleteCloseBtn">&times;</span>
			</div>
			<div class="modal-body">
				<p style="margin-bottom: 8px">Are you sure you want to delete this student?</p>
				<p><strong>ID:</strong> <span id="deleteStudentId"></span></p>
				<p><strong>Name:</strong> <span id="deleteStudentName"></span></p>
			</div>
			<div class="modal-footer">
				<button type="button" id="deleteCancelBtn" class="btn-secondary">Cancel</button>
				<button type="button" id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
			</div>
		</div>
	</div>

	<script src="{{ url_for('static', filename='js/students.js') }}"></script>
</body>

</html>
