<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Enrollments - School Database</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
</head>

<body>
	<div class="layout">
		<div class="sidebar">
			<!-- sidebar content -->
			<a href="/" style="margin-bottom: 2vh;">Index</a>
			<a href="/students">Students</a>
			<a href="/teachers">Teachers</a>
			<a href="/classes">Classes</a>
			<a href="/subjects">Subjects</a>
			<a href="/enrollments">Enrollments</a>
		</div>

		<div class="main">
			<div class="header-button">
				<h1>Enrollments</h1>
				<button class="btn" id="addEnrollmentBtn" style="padding: 12px;">+ Add enrollment</button>
			</div>

			<div>
				<table class="information-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Class</th>
							<th>Subject</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<!-- To be populated by JavaScript -->
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<!-- Add Enrollment Modal -->
	<div id="addEnrollmentModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Add New Enrollment</h2>
				<span class="close">&times;</span>
			</div>
			<form id="addEnrollmentForm" class="modal-body">
				<div class="form-group">
					<label for="classId">Class:</label>
					<select id="classId" name="classId" required>
						<option value="">-- Select a Class --</option>
					</select>
				</div>
				<div class="form-group">
					<label for="subjectId">Subject:</label>
					<select id="subjectId" name="subjectId" required>
						<option value="">-- Select a Subject --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Add Enrollment</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Edit Enrollment Modal -->
	<div id="editEnrollmentModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2>Edit Enrollment</h2>
				<span class="close" id="editCloseBtn">&times;</span>
			</div>
			<form id="editEnrollmentForm" class="modal-body">
				<input type="hidden" id="editEnrollmentId" name="enrollmentId">
				<div class="form-group">
					<label for="editClassId">Class:</label>
					<select id="editClassId" name="classId" required>
						<option value="">-- Select a Class --</option>
					</select>
				</div>
				<div class="form-group">
					<label for="editSubjectId">Subject:</label>
					<select id="editSubjectId" name="subjectId" required>
						<option value="">-- Select a Subject --</option>
					</select>
				</div>
				<div class="modal-footer">
					<button type="button" id="editCancelBtn" class="btn-secondary">Cancel</button>
					<button type="submit" class="btn">Update Enrollment</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Delete Enrollment Modal -->
	<div id="deleteEnrollmentModal" class="modal">
		<div class="modal-content" style="max-width: 400px;">
			<div class="modal-header">
				<h2>Delete Enrollment</h2>
				<span class="close" id="deleteCloseBtn">&times;</span>
			</div>
			<div class="modal-body">
				<p style="margin-bottom: 8px">Are you sure you want to delete this enrollment?</p>
				<p><strong>ID:</strong> <span id="deleteEnrollmentId"></span></p>
				<p><strong>Class:</strong> <span id="deleteEnrollmentClass"></span></p>
				<p><strong>Subject:</strong> <span id="deleteEnrollmentSubject"></span></p>
			</div>
			<div class="modal-footer">
				<button type="button" id="deleteCancelBtn" class="btn-secondary">Cancel</button>
				<button type="button" id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
			</div>
		</div>
	</div>

	<script src="{{ url_for('static', filename='js/enrollments.js') }}"></script>
</body>

</html>
